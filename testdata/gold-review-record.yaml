- page: 3
  text: (dagger) Values depend strongly on the presence of even slight amounts of impurities.
  type: paragraph
- page: 4
  text: Resistivity depends on temperature — usually in metals, resistance rises as temperature rises
    (R increases when T increases).
  type: paragraph
- page: 4
  text: Superconductors — materials with zero resistance — are generally at extremely low temperature.
    ‘High temperature’ superconductors are those which exhibit R = 0 above 77 K, the boiling point of
    nitrogen.
  type: paragraph
- level: 2
  page: 4
  text: Ohmic Materials (every material in 1B)
  type: heading
- page: 4
  text: Ohmic materials obey Ohm’s Law.
  type: paragraph
- normalized_math: I = \dfrac{V}{R}
  page: 4
  spoken_math_alternative: I equals V over R.
  type: formula
- complexity: simple
  figure_alternative: 'A current-versus-voltage graph for ohmic materials: straight lines through the
    origin whose slope is 1/R, so a larger resistance gives a shallower line.'
  page: 4
  type: figure
- normalized_math: I = \left(\dfrac{1}{R}\right) V
  page: 4
  spoken_math_alternative: I equals one over R, times V; as R increases the slope delta I over delta V
    decreases.
  type: formula
- level: 2
  page: 4
  text: Ohm’s Law
  type: heading
- normalized_math: V = I R
  page: 4
  spoken_math_alternative: V equals I times R.
  type: formula
- page: 4
  text: 'Example: In the circuit below, is V higher at point A or point B? What about I?'
  type: paragraph
- complexity: simple
  figure_alternative: A circuit loop with a battery and a resistor; point A is just before the resistor
    and point B just after it, with current I flowing from A to B.
  page: 4
  type: figure
- normalized_math: V = I R \Rightarrow V_A > V_B
  page: 4
  spoken_math_alternative: Because V equals I R, the potential at A is greater than the potential at B.
  type: formula
- page: 5
  text: We say that ‘voltage drops’ across a resistor.
  type: paragraph
- page: 5
  text: The current is the same at A and B. The current is lower through this whole circuit due to the
    resistor.
  type: paragraph
- page: 5
  text: 'Mental model: a traffic jam!'
  type: paragraph
- complexity: complex
  detailed_figure_description: Electrons drawn as small boxes form a continuous queue around a rectangular
    loop. A resistor labeled R sits along the top of the loop and the electrons bunch together as they
    pass through it; a voltage source labeled V with plus and minus terminals sits along the bottom. The
    image illustrates that the same current flows everywhere while the resistor slows the electrons.
  figure_alternative: 'A ‘traffic jam’ analogy: electrons queued single-file around a loop, bunching up
    as they pass through a resistor, with a battery at the bottom.'
  page: 5
  type: figure
- page: 5
  text: 'Example: A flashlight bulb draws 300 mA from its 1.5 V battery. What is the resistance of the
    bulb? If the battery degrades and only produces 1.2 V, how would the current change?'
  type: paragraph
- complexity: simple
  figure_alternative: An illustration of a flashlight with its bulb lit and a battery inside.
  page: 5
  type: figure
- normalized_math: I = \dfrac{V}{R} \Rightarrow R = \dfrac{V}{I} = \dfrac{1.5\ \text{V}}{0.30\ \text{A}}
    = 5.0\ \Omega
  page: 5
  spoken_math_alternative: I equals V over R, so R equals V over I, which is 1.5 volts over 0.30 amperes,
    equals 5.0 ohms.
  type: formula
- normalized_math: V \to 1.2\ \text{V}:\quad I = \dfrac{1.2\ \text{V}}{5.0\ \Omega} = 0.24\ \text{A} =
    240\ \text{mA}
  page: 5
  spoken_math_alternative: With V reduced to 1.2 volts, I equals 1.2 volts over 5.0 ohms, equals 0.24
    amperes, or 240 milliamperes.
  type: formula
- page: 6
  text: 'Example: Speaker wires. Suppose you want to connect your stereo to remote speakers. (a) If each
    wire must be 20 m long, what diameter copper wire should you use to keep the resistance less than
    0.10 Ohm per wire? (b) If the current to each speaker is 4.0 A, what is the potential difference,
    or voltage drop, across each wire?'
  type: paragraph
- complexity: simple
  figure_alternative: An illustration of a stereo receiver connected to two remote speakers by 20-meter
    wires.
  page: 6
  type: figure
- complexity: simple
  figure_alternative: A circuit in which a voltage source V drives current I through the wiring resistance
    R in series with the speaker.
  page: 6
  type: figure
- normalized_math: (a)\ \rho_{cu} = 1.68\times10^{-9}\ \Omega\cdot m,\quad L = 20\ m,\quad R = 0.10\ \Omega
  page: 6
  spoken_math_alternative: 'Part a: rho for copper is written as 1.68 times ten to the negative nine ohm-meters;
    L equals 20 meters; R equals 0.10 ohms.'
  type: formula
- normalized_math: A = \pi r^2 = \pi\left(\dfrac{d}{2}\right)^2,\quad R = \rho\,\dfrac{L}{A} = \dfrac{4\rho
    L}{\pi d^2}
  page: 6
  spoken_math_alternative: The cross-sectional area A equals pi r squared, which is pi times d over two,
    squared; so R equals rho L over A, which equals four rho L over pi d squared.
  type: formula
- normalized_math: d^2 > \dfrac{4\rho L}{\pi R} \Rightarrow d > \left[\dfrac{4\rho L}{\pi R}\right]^{1/2}
    = \left[\dfrac{4(1.68\times10^{-8}\ \Omega\cdot m)(20\ m)}{\pi(0.10\ \Omega)}\right]^{1/2} = 2.1\
    \text{mm}
  page: 6
  spoken_math_alternative: d squared is greater than four rho L over pi R, so d is greater than the square
    root of four rho L over pi R; substituting 1.68 times ten to the negative eight ohm-meters gives about
    2.1 millimeters.
  type: formula
- normalized_math: (b)\ V = I R = (4.0\ \text{A})(0.10\ \Omega) \Rightarrow V_R = 0.400\ \text{V} = 400\
    \text{mV}
  page: 6
  spoken_math_alternative: 'Part b: V equals I R, which is 4.0 amperes times 0.10 ohms; the voltage drop
    V sub R equals 0.400 volts, or 400 millivolts.'
  type: formula
- level: 2
  page: 6
  text: Electrical Energy & Power
  type: heading
- normalized_math: \text{Power} = \dfrac{\text{Energy}}{\text{time}}
  page: 6
  spoken_math_alternative: Power equals energy divided by time.
  type: formula
- normalized_math: U = qV
  page: 6
  spoken_math_alternative: Electrical energy U equals charge q times voltage V.
  type: formula
- normalized_math: P = \dfrac{(\text{charge})(\text{Voltage})}{\text{time}} = IV
  page: 6
  spoken_math_alternative: Power equals charge times voltage divided by time, which equals I times V.
  type: formula
- level: 2
  page: 7
  text: Units
  type: heading
- normalized_math: I\ (\text{current}):\ [A] = \dfrac{C}{s}
  page: 7
  spoken_math_alternative: 'Current I: one ampere equals one coulomb per second.'
  type: formula
- normalized_math: V\ (\text{potential difference}):\ [V] = \dfrac{J}{C}
  page: 7
  spoken_math_alternative: 'Potential difference V: one volt equals one joule per coulomb.'
  type: formula
- normalized_math: P\ (\text{power}):\ [W] = \dfrac{J}{s}
  page: 7
  spoken_math_alternative: 'Power P: one watt equals one joule per second.'
  type: formula
- normalized_math: R\ (\text{resistance}):\ [\Omega] = \dfrac{V}{A} = \dfrac{V\cdot s}{C} = \dfrac{J\cdot
    s}{C^2}
  page: 7
  spoken_math_alternative: 'Resistance R: one ohm equals one volt per ampere, which equals volt-seconds
    per coulomb, which equals joule-seconds per coulomb squared.'
  type: formula
- normalized_math: W = A\,V = \left(\dfrac{C}{s}\right)\left(\dfrac{J}{C}\right) = \dfrac{J}{s}
  page: 7
  spoken_math_alternative: One watt equals one ampere times one volt, which is coulombs per second times
    joules per coulomb, which equals joules per second.
  type: formula
- page: 7
  text: 'Power can also be expressed:'
  type: paragraph
- normalized_math: (V = IR) \Rightarrow P = I(IR) = I^2 R
  page: 7
  spoken_math_alternative: Using V equals I R, power equals I times I R, which equals I squared times
    R.
  type: formula
- normalized_math: \left(I = \dfrac{V}{R}\right) \Rightarrow P = \left(\dfrac{V}{R}\right)V = \dfrac{V^2}{R}
  page: 7
  spoken_math_alternative: Using I equals V over R, power equals V over R times V, which equals V squared
    over R.
  type: formula
- normalized_math: P = IV = I^2 R = \dfrac{V^2}{R}
  page: 7
  spoken_math_alternative: Power equals I V, equals I squared R, equals V squared over R.
  type: formula
- level: 2
  page: 7
  text: Power Sources (Voltage Source)
  type: heading
- page: 7
  text: 'Battery (DC, direct current): the source provides a steady, constant voltage.'
  type: paragraph
- complexity: simple
  figure_alternative: 'A graph of a DC battery’s voltage versus time: a constant horizontal line at about
    1.5 volts.'
  page: 7
  type: figure
- page: 7
  text: 'Generator (AC, alternating current). Advantages over DC: easier and safer to transmit over long
    distances, and easy and efficient to generate.'
  type: paragraph
- complexity: simple
  figure_alternative: 'A graph of AC voltage versus time: a sine wave oscillating between plus V0 and
    minus V0, with one full cycle marked.'
  page: 8
  type: figure
- normalized_math: V = V_0 \sin(\omega t)
  page: 8
  spoken_math_alternative: V equals V-naught times the sine of omega t.
  type: formula
- complexity: simple
  figure_alternative: 'The circuit symbol for an AC voltage source: a circle enclosing a sine wave, shown
    in a small loop with a capacitor and a resistor.'
  page: 8
  type: figure
- page: 8
  text: Peak voltage is V0. Omega is the angular frequency in radians per second. The standard line frequency
    f is 60 Hz (cycles per second).
  type: paragraph
- normalized_math: \omega = 2\pi f
  page: 8
  spoken_math_alternative: Omega equals two pi f.
  type: formula
- normalized_math: \left(60\ \dfrac{\text{cycles}}{s}\right)\left(2\pi\ \dfrac{\text{rad}}{\text{cycle}}\right)
    = 377\ \dfrac{\text{rad}}{s}
  page: 8
  spoken_math_alternative: 60 cycles per second times two pi radians per cycle equals 377 radians per
    second.
  type: formula
- level: 2
  page: 8
  text: ‘Average’ voltage (RMS)
  type: heading
- normalized_math: V_{RMS} = \sqrt{\overline{V^2}}
  page: 8
  spoken_math_alternative: V RMS equals the square root of the average of V squared.
  type: formula
- page: 8
  text: 'Fact: the average value of sine squared theta (or cosine squared theta) over a cycle is one half.'
  type: paragraph
- complexity: simple
  figure_alternative: 'A graph of sine squared of omega t versus time: a non-negative wave oscillating
    between 0 and 1, whose average value is one half.'
  page: 8
  type: figure
- normalized_math: \langle \sin^2(\omega t) \rangle = \tfrac{1}{2}
  page: 8
  spoken_math_alternative: The average of sine squared omega t equals one half.
  type: formula
- normalized_math: V_{RMS} = \left(\overline{V_0^2 \sin^2(\omega t)}\right)^{1/2} = \left(V_0^2 \cdot
    \tfrac{1}{2}\right)^{1/2} = \dfrac{1}{\sqrt{2}} V_0
  page: 8
  spoken_math_alternative: V RMS equals the square root of the average of V-naught squared sine squared
    omega t, which equals the square root of V-naught squared times one half, which equals one over root
    two times V-naught.
  type: formula
- normalized_math: V_{RMS} = \dfrac{V_0}{\sqrt{2}}
  page: 8
  spoken_math_alternative: V RMS equals V-naught divided by the square root of two.
  type: formula
- level: 2
  page: 9
  text: Current also ‘alternates’ in AC voltage
  type: heading
- normalized_math: I = \dfrac{V}{R} \Rightarrow I = \dfrac{V_0}{R}\sin(\omega t)
  page: 9
  spoken_math_alternative: Since I equals V over R, I equals V-naught over R times the sine of omega t.
  type: formula
- normalized_math: I = I_0 \sin(\omega t),\quad I_0 = \dfrac{V_0}{R}
  page: 9
  spoken_math_alternative: I equals I-naught times sine omega t, where I-naught, the peak current, equals
    V-naught over R.
  type: formula
- normalized_math: I_{RMS} = \dfrac{1}{\sqrt{2}} I_0
  page: 9
  spoken_math_alternative: I RMS equals one over root two times I-naught.
  type: formula
- level: 2
  page: 9
  text: Power (alternating voltage)
  type: heading
- normalized_math: P_{AVG} = I_{RMS} V_{RMS}
  page: 9
  spoken_math_alternative: The average power equals I RMS times V RMS.
  type: formula
- normalized_math: P_{AVG} = I_{RMS}^2 R
  page: 9
  spoken_math_alternative: The average power equals I RMS squared times R.
  type: formula
- normalized_math: P_{AVG} = \dfrac{V_{RMS}^2}{R}
  page: 9
  spoken_math_alternative: The average power equals V RMS squared over R.
  type: formula
- level: 2
  page: 9
  text: Electron Drift Velocity
  type: heading
- page: 9
  text: 'Misconception #2: electrons travel near the speed of light. Reality: electric fields propagate
    near the speed of light, but the electrons that make up the current are very slow in electrical circuits.'
  type: paragraph
- complexity: complex
  detailed_figure_description: A cylindrical conductor is drawn horizontally. Its left circular face is
    labeled with area A; a thin slice of width dx is marked inside. Arrows labeled I and E point to the
    right. A separate sketch shows electrons moving on random paths but with a slow net drift opposing
    the current.
  figure_alternative: A conductor segment of cross-sectional area A carrying current I, with an internal
    electric field E driving electrons to drift slowly opposite the current.
  page: 9
  type: figure
- normalized_math: I = e\, n\, A\, v
  page: 9
  spoken_math_alternative: Current equals e times n times A times v, where e is the elementary charge,
    n is the number of electrons per unit volume, A is the cross-sectional area, and v is the drift velocity.
  type: formula
- page: 10
  text: 'Example: What current would be produced in 12-gauge copper wire (r = 1 mm) if the electron drift
    velocity was 1.0 mm/s (about 0.0022 mph)?'
  type: paragraph
- normalized_math: e = 1.60\times10^{-19}\ \text{C},\quad A = \pi(0.001\ m)^2,\quad v = 0.001\ \text{m/s},\quad
    I = e\,n\,A\,v
  page: 10
  spoken_math_alternative: The elementary charge e is 1.60 times ten to the negative nineteen coulombs;
    the area A is pi times 0.001 meters squared; the drift velocity v is 0.001 meters per second; and
    I equals e n A v. The number density n is left blank to be computed.
  type: formula
- page: 10
  text: Copper (Z = 29) has one ‘free’ electron per atom, so the number of atoms per cubic meter gives
    the number of electrons per cubic meter.
  type: paragraph
- normalized_math: n = \left(\dfrac{8.96\ \text{g}}{\text{cm}^3}\right)\left(\dfrac{1\ \text{mol}}{63.55\
    \text{g}}\right)\left(\dfrac{6.02\times10^{23}\ \text{atoms}}{\text{mol}}\right)\left(\dfrac{100\
    \text{cm}}{1\ \text{m}}\right)^3 = 8.5\times10^{28}\ m^{-3}
  page: 10
  spoken_math_alternative: n equals 8.96 grams per cubic centimeter, times one mole per 63.55 grams, times
    6.02 times ten to the twenty-third atoms per mole, times 100 centimeters per meter cubed, which is
    about 8.5 times ten to the twenty-eighth per cubic meter.
  type: formula
- normalized_math: I = (1.6\times10^{-19}\ \text{C})(8.5\times10^{28}\ m^{-3})(\pi(0.001\ m)^2)(0.001\
    \text{m/s}) = 43\ \text{A}
  page: 10
  spoken_math_alternative: I equals 1.6 times ten to the negative nineteen coulombs, times 8.5 times ten
    to the twenty-eighth per cubic meter, times pi times 0.001 meters squared, times 0.001 meters per
    second, which is about 43 amperes.
  type: formula
- level: 2
  page: 10
  text: Electrical Hazards
  type: heading
- page: 10
  text: Electrical power produces heat, and too much of it produces fires, burns, melting, and so on.
  type: paragraph
- page: 10
  text: 'Example: A short is when there is an unplanned low-resistance path in a circuit.'
  type: paragraph
- complexity: complex
  detailed_figure_description: A wall plug at the left connects through a cord to an appliance at the
    right whose element is labeled R. Along the cord, a point where the insulation wore away creates a
    low-resistance path labeled r bridging the two conductors. Labels P equals V squared over r and I
    equals V over r note the large power and current at the short.
  figure_alternative: A diagram of an appliance cord where worn-away insulation creates a short circuit
    — a low-resistance path that bypasses the intended load.
  page: 10
  type: figure
- normalized_math: P = \dfrac{V^2}{r},\quad I = \dfrac{V}{r}
  page: 10
  spoken_math_alternative: At the short, power equals V squared over r, and current equals V over r.
  type: formula
- page: 11
  text: Our bodies are electrical! For example, pacemakers use electrical pulses to stimulate heart muscle.
  type: paragraph
- page: 11
  text: Wear insulating shoes to prevent being a ‘short’ — important in many professions.
  type: paragraph
- page: 11
  text: Large current is dangerous!
