- complexity: complex
  detailed_figure_description: 'A black-and-white photograph in which fine fibers align with the electric
    field around a two-terminal circuit. A printed callout labels the internal electric field as constant
    in magnitude and parallel to the axis of the conductor; a second callout labels the external electric
    field as produced by the surface charges. The caption reads: Photograph from Jefimenko (1962: 20).
    Annotations added.'
  figure_alternative: A 1962 photograph (Jefimenko) that makes the electric field around a simple current-carrying
    circuit visible using suspended fibers.
