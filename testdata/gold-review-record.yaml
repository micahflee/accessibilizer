semantic_layer:
- level: 1
  page: 1
  text: 'Chapter 20: Current, Resistance, Ohm''s Law, Power, AC/DC'
  type: heading
- complexity: complex
  detailed_figure_description: A single-loop circuit. A battery, labeled V, has its positive terminal
    at the top and negative terminal at the bottom. Blue arrows labeled I mark the conventional current
    flowing clockwise out of the positive terminal, and arrows labeled e- mark electrons flowing counter-clockwise,
    opposite to I.
  figure_alternative: A simple circuit in which a battery drives conventional current I one way around
    a loop while electrons flow the opposite way.
  page: 1
  type: figure
- page: 1
  text: Electrical current (I) is the rate of ‘flow’ of positive charge.
  type: paragraph
- normalized_math: I = Q / \Delta t = Q / t
  page: 1
  spoken_math_alternative: I equals Q divided by delta t, which equals Q divided by t.
  type: formula
- page: 1
  text: 'Its direction (from DC, or direct current, voltage) is opposite the ‘flow’ of electrons: from
    plus to minus.'
  type: paragraph
- level: 2
  page: 1
  text: Units of current
  type: heading
- page: 1
  text: Current is measured in amperes (A), also known as ‘amps’. The ampere is an SI base unit.
  type: paragraph
- normalized_math: '[A] = C / s'
  page: 1
  spoken_math_alternative: One ampere equals one coulomb per second.
  type: formula
- level: 2
  page: 1
  text: Electric fields in a Simple Circuit (1962)
  type: heading
- complexity: complex
  detailed_figure_description: 'A black-and-white photograph in which fine fibers align with the electric
    field around a two-terminal circuit. A printed callout labels the internal electric field as constant
    in magnitude and parallel to the axis of the conductor; a second callout labels the external electric
    field as produced by the surface charges. The caption reads: Photograph from Jefimenko (1962: 20).
    Annotations added.'
  figure_alternative: A 1962 photograph (Jefimenko) that makes the electric field around a simple current-carrying
    circuit visible using suspended fibers.
  page: 1
  type: figure
- page: 2
  text: 'Example: A steady current of 2.5 A is created in a wire for 1.0 minute. How much charge passed
    by any given point, and how many electrons would this be?'
  type: paragraph
- normalized_math: I = Q / \Delta t = 2.5\ \text{C/s} = Q / t
  page: 2
  spoken_math_alternative: I equals Q over delta t; here I is 2.5 coulombs per second, which equals Q
    over t.
  type: formula
- normalized_math: Q = I \cdot t = (2.5\ \text{C/s})(60\ \text{s}) = 150\ \text{C}
  page: 2
  spoken_math_alternative: Q equals I times t, which is 2.5 coulombs per second times 60 seconds, equals
    150 coulombs.
  type: formula
- normalized_math: N = (150\ \text{C})\left(\dfrac{1\ e^-}{1.6\times10^{-19}\ \text{C}}\right) = 9.4\times10^{20}\
    e^-
  page: 2
  spoken_math_alternative: N equals 150 coulombs times one electron per 1.6 times ten to the negative
    nineteen coulombs, which is about 9.4 times ten to the twentieth electrons.
  type: formula
- normalized_math: n = 9.4\times10^{20}\ e^- \left(\dfrac{1\ \text{mol}}{6.022\times10^{23}\ e^-}\right)
    = 0.0016\ \text{mol}
  page: 2
  spoken_math_alternative: n equals 9.4 times ten to the twentieth electrons divided by 6.022 times ten
    to the twenty-third electrons per mole, which is about 0.0016 moles.
  type: formula
- level: 2
  page: 2
  text: Electrical Resistance
  type: heading
- complexity: complex
  detailed_figure_description: A single-loop circuit like the earlier one, with a battery labeled V and
    its plus and minus terminals, but now a zig-zag resistor labeled R is placed in the loop. Arrows labeled
    e- show electrons circulating around the wire.
  figure_alternative: 'A battery-and-resistor loop: a battery V drives current while a resistor R in the
    loop opposes it; electrons flow around the circuit.'
  page: 2
  type: figure
- complexity: simple
  figure_alternative: 'The circuit symbol for a resistor: a zig-zag line labeled R.'
  page: 2
  type: figure
- normalized_math: '[\Omega] = \dfrac{V}{A} = \dfrac{\text{J/C}}{\text{C/s}}'
  page: 2
  spoken_math_alternative: One ohm equals one volt per ampere, which equals joules per coulomb divided
    by coulombs per second.
  type: formula
- page: 2
  text: A resistor resists the flow of current. Resistors are often used to limit current in part of a
    circuit. Wires themselves have some resistance, but we’ll usually ignore it.
  type: paragraph
- complexity: complex
  detailed_figure_description: A close-up photograph of a green printed circuit board densely packed with
    components. Rows of small color-banded axial resistors run across the board among transistors and
    an integrated circuit. Two handwritten arrows and the label ‘resistors!’ point to the banded components.
  figure_alternative: A photograph of a populated circuit board; handwritten arrows point to the axial
    components and label them ‘resistors!’.
  page: 3
  type: figure
- level: 2
  page: 3
  text: 'Analogy: ‘friction’'
  type: heading
- complexity: simple
  figure_alternative: 'An analogy diagram: a row of electrons is pushed to the right by an applied force
    F while a friction force f acts to the left, modeling resistance.'
  page: 3
  type: figure
- page: 3
  text: 'Simplification: electric fields inside materials interact with the current.'
  type: paragraph
- complexity: simple
  figure_alternative: A cylindrical resistor carrying current I, drawn with its length L and cross-sectional
    area A.
  page: 3
  type: figure
- level: 2
  page: 3
  text: Resistivity (rho)
  type: heading
- normalized_math: R \propto \dfrac{L}{A} \Rightarrow R = \rho\, \dfrac{L}{A}
  page: 3
  spoken_math_alternative: R is proportional to L over A; therefore R equals rho times L over A.
  type: formula
- normalized_math: '[\Omega] = (\Omega\cdot m)\left(\dfrac{m}{m^2}\right)'
  page: 3
  spoken_math_alternative: One ohm equals an ohm-meter times meters per meter squared.
  type: formula
