candidates:
- crop: regions/page-1-r0001.png
  id: page-1-r0001
  text: 'Chapter 20: Current, Resistance, Ohm''s Law, Power, AC/DC'
  type: document_structure
- crop: regions/page-1-r0002.png
  id: page-1-r0002
  text: A simple circuit in which a battery drives conventional current I one way around a loop while
    electrons flow the opposite way.
  type: figure
- crop: regions/page-1-r0003.png
  id: page-1-r0003
  text: Electrical current (I) is the rate of ‘flow’ of positive charge.
  type: handwriting
- crop: regions/page-1-r0004.png
  id: page-1-r0004
  text: I = Q / \Delta t = Q / t
  type: formula
- crop: regions/page-1-r0005.png
  id: page-1-r0005
  text: 'Its direction (from DC, or direct current, voltage) is opposite the ‘flow’ of electrons: from
    plus to minus.'
  type: handwriting
- crop: regions/page-1-r0006.png
  id: page-1-r0006
  text: Units of current
  type: document_structure
- crop: regions/page-1-r0007.png
  id: page-1-r0007
  text: Current is measured in amperes (A), also known as ‘amps’. The ampere is an SI base unit.
  type: handwriting
- crop: regions/page-1-r0008.png
  id: page-1-r0008
  text: '[A] = C / s'
  type: formula
- crop: regions/page-1-r0009.png
  id: page-1-r0009
  text: Electric fields in a Simple Circuit (1962)
  type: document_structure
- crop: regions/page-1-r0010.png
  id: page-1-r0010
  text: A 1962 photograph (Jefimenko) that makes the electric field around a simple current-carrying circuit
    visible using suspended fibers.
  type: figure
- crop: regions/page-2-r0001.png
  id: page-2-r0001
  text: 'Example: A steady current of 2.5 A is created in a wire for 1.0 minute. How much charge passed
    by any given point, and how many electrons would this be?'
  type: handwriting
- crop: regions/page-2-r0002.png
  id: page-2-r0002
  text: I = Q / \Delta t = 2.5\ \text{C/s} = Q / t
  type: formula
- crop: regions/page-2-r0003.png
  id: page-2-r0003
  text: Q = I \cdot t = (2.5\ \text{C/s})(60\ \text{s}) = 150\ \text{C}
  type: formula
- crop: regions/page-2-r0004.png
  id: page-2-r0004
  text: N = (150\ \text{C})\left(\dfrac{1\ e^-}{1.6\times10^{-19}\ \text{C}}\right) = 9.4\times10^{20}\
    e^-
  type: formula
- crop: regions/page-2-r0005.png
  id: page-2-r0005
  text: n = 9.4\times10^{20}\ e^- \left(\dfrac{1\ \text{mol}}{6.022\times10^{23}\ e^-}\right) = 0.0016\
    \text{mol}
  type: formula
- crop: regions/page-2-r0006.png
  id: page-2-r0006
  text: Electrical Resistance
  type: document_structure
- crop: regions/page-2-r0007.png
  id: page-2-r0007
  text: 'A battery-and-resistor loop: a battery V drives current while a resistor R in the loop opposes
    it; electrons flow around the circuit.'
  type: figure
- crop: regions/page-2-r0008.png
  id: page-2-r0008
  text: 'The circuit symbol for a resistor: a zig-zag line labeled R.'
  type: figure
- crop: regions/page-2-r0009.png
  id: page-2-r0009
  text: '[\Omega] = \dfrac{V}{A} = \dfrac{\text{J/C}}{\text{C/s}}'
  type: formula
- crop: regions/page-2-r0010.png
  id: page-2-r0010
  text: A resistor resists the flow of current. Resistors are often used to limit current in part of a
    circuit. Wires themselves have some resistance, but we’ll usually ignore it.
  type: handwriting
- crop: regions/page-3-r0001.png
  id: page-3-r0001
  text: A photograph of a populated circuit board; handwritten arrows point to the axial components and
    label them ‘resistors!’.
  type: figure
- crop: regions/page-3-r0002.png
  id: page-3-r0002
  text: 'Analogy: ‘friction’'
  type: document_structure
- crop: regions/page-3-r0003.png
  id: page-3-r0003
  text: 'An analogy diagram: a row of electrons is pushed to the right by an applied force F while a friction
    force f acts to the left, modeling resistance.'
  type: figure
- crop: regions/page-3-r0004.png
  id: page-3-r0004
  text: 'Simplification: electric fields inside materials interact with the current.'
  type: handwriting
- crop: regions/page-3-r0005.png
  id: page-3-r0005
  text: A cylindrical resistor carrying current I, drawn with its length L and cross-sectional area A.
  type: figure
- crop: regions/page-3-r0006.png
  id: page-3-r0006
  text: Resistivity (rho)
  type: document_structure
- crop: regions/page-3-r0007.png
  id: page-3-r0007
  text: R \propto \dfrac{L}{A} \Rightarrow R = \rho\, \dfrac{L}{A}
  type: formula
- crop: regions/page-3-r0008.png
  id: page-3-r0008
  text: '[\Omega] = (\Omega\cdot m)\left(\dfrac{m}{m^2}\right)'
  type: formula
- crop: regions/page-3-r0009.png
  id: page-3-r0009
  text: Table 25-1  Resistivity and Temperature Coefficients (at 20 degrees C)
  type: table
- crop: regions/page-3-r0010.png
  id: page-3-r0010
  text: (dagger) Values depend strongly on the presence of even slight amounts of impurities.
  type: handwriting
- crop: regions/page-4-r0001.png
  id: page-4-r0001
  text: Resistivity depends on temperature — usually in metals, resistance rises as temperature rises
    (R increases when T increases).
  type: handwriting
- crop: regions/page-4-r0002.png
  id: page-4-r0002
  text: Superconductors — materials with zero resistance — are generally at extremely low temperature.
    ‘High temperature’ superconductors are those which exhibit R = 0 above 77 K, the boiling point of
    nitrogen.
  type: handwriting
- crop: regions/page-4-r0003.png
  id: page-4-r0003
  text: Ohmic Materials (every material in 1B)
  type: document_structure
- crop: regions/page-4-r0004.png
  id: page-4-r0004
  text: Ohmic materials obey Ohm’s Law.
  type: handwriting
- crop: regions/page-4-r0005.png
  id: page-4-r0005
  text: I = \dfrac{V}{R}
  type: formula
- crop: regions/page-4-r0006.png
  id: page-4-r0006
  text: 'A current-versus-voltage graph for ohmic materials: straight lines through the origin whose slope
    is 1/R, so a larger resistance gives a shallower line.'
  type: figure
- crop: regions/page-4-r0007.png
  id: page-4-r0007
  text: I = \left(\dfrac{1}{R}\right) V
  type: formula
- crop: regions/page-4-r0008.png
  id: page-4-r0008
  text: Ohm’s Law
  type: document_structure
- crop: regions/page-4-r0009.png
  id: page-4-r0009
  text: V = I R
  type: formula
- crop: regions/page-4-r0010.png
  id: page-4-r0010
  text: 'Example: In the circuit below, is V higher at point A or point B? What about I?'
  type: handwriting
- crop: regions/page-4-r0011.png
  id: page-4-r0011
  text: A circuit loop with a battery and a resistor; point A is just before the resistor and point B
    just after it, with current I flowing from A to B.
  type: figure
- crop: regions/page-4-r0012.png
  id: page-4-r0012
  text: V = I R \Rightarrow V_A > V_B
  type: formula
- crop: regions/page-5-r0001.png
  id: page-5-r0001
  text: We say that ‘voltage drops’ across a resistor.
  type: handwriting
- crop: regions/page-5-r0002.png
  id: page-5-r0002
  text: The current is the same at A and B. The current is lower through this whole circuit due to the
    resistor.
  type: handwriting
- crop: regions/page-5-r0003.png
  id: page-5-r0003
  text: 'Mental model: a traffic jam!'
  type: handwriting
- crop: regions/page-5-r0004.png
  id: page-5-r0004
  text: 'A ‘traffic jam’ analogy: electrons queued single-file around a loop, bunching up as they pass
    through a resistor, with a battery at the bottom.'
  type: figure
- crop: regions/page-5-r0005.png
  id: page-5-r0005
  text: 'Example: A flashlight bulb draws 300 mA from its 1.5 V battery. What is the resistance of the
    bulb? If the battery degrades and only produces 1.2 V, how would the current change?'
  type: handwriting
- crop: regions/page-5-r0006.png
  id: page-5-r0006
  text: An illustration of a flashlight with its bulb lit and a battery inside.
  type: figure
- crop: regions/page-5-r0007.png
  id: page-5-r0007
  text: I = \dfrac{V}{R} \Rightarrow R = \dfrac{V}{I} = \dfrac{1.5\ \text{V}}{0.30\ \text{A}} = 5.0\ \Omega
  type: formula
- crop: regions/page-5-r0008.png
  id: page-5-r0008
  text: V \to 1.2\ \text{V}:\quad I = \dfrac{1.2\ \text{V}}{5.0\ \Omega} = 0.24\ \text{A} = 240\ \text{mA}
  type: formula
- crop: regions/page-6-r0001.png
  id: page-6-r0001
  text: 'Example: Speaker wires. Suppose you want to connect your stereo to remote speakers. (a) If each
    wire must be 20 m long, what diameter copper wire should you use to keep the resistance less than
    0.10 Ohm per wire? (b) If the current to each speaker is 4.0 A, what is the potential difference,
    or voltage drop, across each wire?'
  type: text
- crop: regions/page-6-r0002.png
  id: page-6-r0002
  text: An illustration of a stereo receiver connected to two remote speakers by 20-meter wires.
  type: figure
- crop: regions/page-6-r0003.png
  id: page-6-r0003
  text: A circuit in which a voltage source V drives current I through the wiring resistance R in series
    with the speaker.
  type: figure
- crop: regions/page-6-r0004.png
  id: page-6-r0004
  text: (a)\ \rho_{cu} = 1.68\times10^{-9}\ \Omega\cdot m,\quad L = 20\ m,\quad R = 0.10\ \Omega
  type: formula
- crop: regions/page-6-r0005.png
  id: page-6-r0005
  text: A = \pi r^2 = \pi\left(\dfrac{d}{2}\right)^2,\quad R = \rho\,\dfrac{L}{A} = \dfrac{4\rho L}{\pi
    d^2}
  type: formula
- crop: regions/page-6-r0006.png
  id: page-6-r0006
  text: d^2 > \dfrac{4\rho L}{\pi R} \Rightarrow d > \left[\dfrac{4\rho L}{\pi R}\right]^{1/2} = \left[\dfrac{4(1.68\times10^{-8}\
    \Omega\cdot m)(20\ m)}{\pi(0.10\ \Omega)}\right]^{1/2} = 2.1\ \text{mm}
  type: formula
- crop: regions/page-6-r0007.png
  id: page-6-r0007
  text: (b)\ V = I R = (4.0\ \text{A})(0.10\ \Omega) \Rightarrow V_R = 0.400\ \text{V} = 400\ \text{mV}
  type: formula
- crop: regions/page-6-r0008.png
  id: page-6-r0008
  text: Electrical Energy & Power
  type: document_structure
- crop: regions/page-6-r0009.png
  id: page-6-r0009
  text: \text{Power} = \dfrac{\text{Energy}}{\text{time}}
  type: formula
- crop: regions/page-6-r0010.png
  id: page-6-r0010
  text: U = qV
  type: formula
- crop: regions/page-6-r0011.png
  id: page-6-r0011
  text: P = \dfrac{(\text{charge})(\text{Voltage})}{\text{time}} = IV
  type: formula
- crop: regions/page-7-r0001.png
  id: page-7-r0001
  text: Units
  type: document_structure
- crop: regions/page-7-r0002.png
  id: page-7-r0002
  text: I\ (\text{current}):\ [A] = \dfrac{C}{s}
  type: formula
- crop: regions/page-7-r0003.png
  id: page-7-r0003
  text: V\ (\text{potential difference}):\ [V] = \dfrac{J}{C}
  type: formula
- crop: regions/page-7-r0004.png
  id: page-7-r0004
  text: P\ (\text{power}):\ [W] = \dfrac{J}{s}
  type: formula
- crop: regions/page-7-r0005.png
  id: page-7-r0005
  text: R\ (\text{resistance}):\ [\Omega] = \dfrac{V}{A} = \dfrac{V\cdot s}{C} = \dfrac{J\cdot s}{C^2}
  type: formula
- crop: regions/page-7-r0006.png
  id: page-7-r0006
  text: W = A\,V = \left(\dfrac{C}{s}\right)\left(\dfrac{J}{C}\right) = \dfrac{J}{s}
  type: formula
- crop: regions/page-7-r0007.png
  id: page-7-r0007
  text: 'Power can also be expressed:'
  type: handwriting
- crop: regions/page-7-r0008.png
  id: page-7-r0008
  text: (V = IR) \Rightarrow P = I(IR) = I^2 R
  type: formula
- crop: regions/page-7-r0009.png
  id: page-7-r0009
  text: \left(I = \dfrac{V}{R}\right) \Rightarrow P = \left(\dfrac{V}{R}\right)V = \dfrac{V^2}{R}
  type: formula
- crop: regions/page-7-r0010.png
  id: page-7-r0010
  text: P = IV = I^2 R = \dfrac{V^2}{R}
  type: formula
- crop: regions/page-7-r0011.png
  id: page-7-r0011
  text: Power Sources (Voltage Source)
  type: document_structure
- crop: regions/page-7-r0012.png
  id: page-7-r0012
  text: 'Battery (DC, direct current): the source provides a steady, constant voltage.'
  type: handwriting
- crop: regions/page-7-r0013.png
  id: page-7-r0013
  text: 'A graph of a DC battery’s voltage versus time: a constant horizontal line at about 1.5 volts.'
  type: figure
- crop: regions/page-7-r0014.png
  id: page-7-r0014
  text: 'Generator (AC, alternating current). Advantages over DC: easier and safer to transmit over long
    distances, and easy and efficient to generate.'
  type: handwriting
- crop: regions/page-8-r0001.png
  id: page-8-r0001
  text: 'A graph of AC voltage versus time: a sine wave oscillating between plus V0 and minus V0, with
    one full cycle marked.'
  type: figure
- crop: regions/page-8-r0002.png
  id: page-8-r0002
  text: V = V_0 \sin(\omega t)
  type: formula
- crop: regions/page-8-r0003.png
  id: page-8-r0003
  text: 'The circuit symbol for an AC voltage source: a circle enclosing a sine wave, shown in a small
    loop with a capacitor and a resistor.'
  type: figure
- crop: regions/page-8-r0004.png
  id: page-8-r0004
  text: Peak voltage is V0. Omega is the angular frequency in radians per second. The standard line frequency
    f is 60 Hz (cycles per second).
  type: handwriting
- crop: regions/page-8-r0005.png
  id: page-8-r0005
  text: \omega = 2\pi f
  type: formula
- crop: regions/page-8-r0006.png
  id: page-8-r0006
  text: \left(60\ \dfrac{\text{cycles}}{s}\right)\left(2\pi\ \dfrac{\text{rad}}{\text{cycle}}\right) =
    377\ \dfrac{\text{rad}}{s}
  type: formula
- crop: regions/page-8-r0007.png
  id: page-8-r0007
  text: ‘Average’ voltage (RMS)
  type: document_structure
- crop: regions/page-8-r0008.png
  id: page-8-r0008
  text: V_{RMS} = \sqrt{\overline{V^2}}
  type: formula
- crop: regions/page-8-r0009.png
  id: page-8-r0009
  text: 'Fact: the average value of sine squared theta (or cosine squared theta) over a cycle is one half.'
  type: handwriting
- crop: regions/page-8-r0010.png
  id: page-8-r0010
  text: 'A graph of sine squared of omega t versus time: a non-negative wave oscillating between 0 and
    1, whose average value is one half.'
  type: figure
- crop: regions/page-8-r0011.png
  id: page-8-r0011
  text: \langle \sin^2(\omega t) \rangle = \tfrac{1}{2}
  type: formula
- crop: regions/page-8-r0012.png
  id: page-8-r0012
  text: V_{RMS} = \left(\overline{V_0^2 \sin^2(\omega t)}\right)^{1/2} = \left(V_0^2 \cdot \tfrac{1}{2}\right)^{1/2}
    = \dfrac{1}{\sqrt{2}} V_0
  type: formula
- crop: regions/page-8-r0013.png
  id: page-8-r0013
  text: V_{RMS} = \dfrac{V_0}{\sqrt{2}}
  type: formula
- crop: regions/page-9-r0001.png
  id: page-9-r0001
  text: Current also ‘alternates’ in AC voltage
  type: document_structure
- crop: regions/page-9-r0002.png
  id: page-9-r0002
  text: I = \dfrac{V}{R} \Rightarrow I = \dfrac{V_0}{R}\sin(\omega t)
  type: formula
- crop: regions/page-9-r0003.png
  id: page-9-r0003
  text: I = I_0 \sin(\omega t),\quad I_0 = \dfrac{V_0}{R}
  type: formula
- crop: regions/page-9-r0004.png
  id: page-9-r0004
  text: I_{RMS} = \dfrac{1}{\sqrt{2}} I_0
  type: formula
- crop: regions/page-9-r0005.png
  id: page-9-r0005
  text: Power (alternating voltage)
  type: document_structure
- crop: regions/page-9-r0006.png
  id: page-9-r0006
  text: P_{AVG} = I_{RMS} V_{RMS}
  type: formula
- crop: regions/page-9-r0007.png
  id: page-9-r0007
  text: P_{AVG} = I_{RMS}^2 R
  type: formula
- crop: regions/page-9-r0008.png
  id: page-9-r0008
  text: P_{AVG} = \dfrac{V_{RMS}^2}{R}
  type: formula
- crop: regions/page-9-r0009.png
  id: page-9-r0009
  text: Electron Drift Velocity
  type: document_structure
- crop: regions/page-9-r0010.png
  id: page-9-r0010
  text: 'Misconception #2: electrons travel near the speed of light. Reality: electric fields propagate
    near the speed of light, but the electrons that make up the current are very slow in electrical circuits.'
  type: handwriting
- crop: regions/page-9-r0011.png
  id: page-9-r0011
  text: A conductor segment of cross-sectional area A carrying current I, with an internal electric field
    E driving electrons to drift slowly opposite the current.
  type: figure
- crop: regions/page-9-r0012.png
  id: page-9-r0012
  text: I = e\, n\, A\, v
  type: formula
- crop: regions/page-10-r0001.png
  id: page-10-r0001
  text: 'Example: What current would be produced in 12-gauge copper wire (r = 1 mm) if the electron drift
    velocity was 1.0 mm/s (about 0.0022 mph)?'
  type: handwriting
- crop: regions/page-10-r0002.png
  id: page-10-r0002
  text: e = 1.60\times10^{-19}\ \text{C},\quad A = \pi(0.001\ m)^2,\quad v = 0.001\ \text{m/s},\quad I
    = e\,n\,A\,v
  type: formula
- crop: regions/page-10-r0003.png
  id: page-10-r0003
  text: Copper (Z = 29) has one ‘free’ electron per atom, so the number of atoms per cubic meter gives
    the number of electrons per cubic meter.
  type: handwriting
- crop: regions/page-10-r0004.png
  id: page-10-r0004
  text: n = \left(\dfrac{8.96\ \text{g}}{\text{cm}^3}\right)\left(\dfrac{1\ \text{mol}}{63.55\ \text{g}}\right)\left(\dfrac{6.02\times10^{23}\
    \text{atoms}}{\text{mol}}\right)\left(\dfrac{100\ \text{cm}}{1\ \text{m}}\right)^3 = 8.5\times10^{28}\
    m^{-3}
  type: formula
- crop: regions/page-10-r0005.png
  id: page-10-r0005
  text: I = (1.6\times10^{-19}\ \text{C})(8.5\times10^{28}\ m^{-3})(\pi(0.001\ m)^2)(0.001\ \text{m/s})
    = 43\ \text{A}
  type: formula
- crop: regions/page-10-r0006.png
  id: page-10-r0006
  text: Electrical Hazards
  type: document_structure
- crop: regions/page-10-r0007.png
  id: page-10-r0007
  text: Electrical power produces heat, and too much of it produces fires, burns, melting, and so on.
  type: handwriting
- crop: regions/page-10-r0008.png
  id: page-10-r0008
  text: 'Example: A short is when there is an unplanned low-resistance path in a circuit.'
  type: handwriting
- crop: regions/page-10-r0009.png
  id: page-10-r0009
  text: A diagram of an appliance cord where worn-away insulation creates a short circuit — a low-resistance
    path that bypasses the intended load.
  type: figure
- crop: regions/page-10-r0010.png
  id: page-10-r0010
  text: P = \dfrac{V^2}{r},\quad I = \dfrac{V}{r}
  type: formula
- crop: regions/page-11-r0001.png
  id: page-11-r0001
  text: Our bodies are electrical! For example, pacemakers use electrical pulses to stimulate heart muscle.
  type: handwriting
- crop: regions/page-11-r0002.png
  id: page-11-r0002
  text: Wear insulating shoes to prevent being a ‘short’ — important in many professions.
  type: handwriting
- crop: regions/page-11-r0003.png
  id: page-11-r0003
  text: Large current is dangerous!
  type: handwriting
- crop: regions/page-11-r0004.png
  id: page-11-r0004
  text: Table 20.3  Effects of Electrical Shock as a Function of Current
  type: table
- crop: regions/page-11-r0005.png
  id: page-11-r0005
  text: Pure H2O is an insulator, but in everyday life water has ions, which makes it conductive. Water
    and electronics don’t mix!
  type: handwriting
